name: UI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ui-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Farm UI regression test
        run: cargo test initial_farm_ui -- --nocapture
