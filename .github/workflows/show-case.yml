name: Showcase

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  TINYDEW_DB_PATH: /tmp/tinydew-showcase.sqlite

jobs:
  hello-case:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      - name: Show Version
        run: cargo run -- -V

      - name: Show Help
        run: cargo run -- -h

      - name: Initial Status
        run: cargo run -- status

      # Basic actions at Farm (start at (3,3))
      - name: Move Down
        run: cargo run -- do move down
      - name: Status after Move Down
        run: cargo run -- status

      - name: Move Left
        run: cargo run -- do move left
      - name: Status after Move Left
        run: cargo run -- status

      - name: Move Right
        run: cargo run -- do move right
      - name: Status after Move Right
        run: cargo run -- status

      - name: Move Up
        run: cargo run -- do move up
      - name: Status after Move Up
        run: cargo run -- status

      - name: Clear Up
        run: cargo run -- do clear up
      - name: Status after Clear
        run: cargo run -- status

      - name: Plant Up
        run: cargo run -- do plant up
      - name: Status after Plant
        run: cargo run -- status

      - name: Water Up
        run: cargo run -- do water up
      - name: Status after Water
        run: cargo run -- status

      - name: Buy Seed
        run: cargo run -- do buy seed
      - name: Status after Buy
        run: cargo run -- status

      - name: Harvest Up
        run: cargo run -- do harvest up
      - name: Status after Harvest
        run: cargo run -- status

      - name: Sell Strawberry
        run: cargo run -- do sell 🍓
      - name: Status after Sell Strawberry
        run: cargo run -- status

      - name: Sell Mushroom
        run: cargo run -- do sell 🍄
      - name: Status after Sell Mushroom
        run: cargo run -- status

      # Navigate Farm -> EastPath (from (3,3) to PathEast (7,5))
      - name: Navigate to (3,4)
        run: cargo run -- do move down
      - name: Navigate to (3,5)
        run: cargo run -- do move down
      - name: Navigate to (4,5)
        run: cargo run -- do move right
      - name: Navigate to (5,5)
        run: cargo run -- do move right
      - name: Navigate to (6,5)
        run: cargo run -- do move right
      - name: Transition Farm to EastPath
        run: cargo run -- do move right
      - name: Status at EastPath
        run: cargo run -- status

      # Navigate EastPath -> Square (from (1,2) to PathSquare (5,0))
      - name: Navigate to (2,2)
        run: cargo run -- do move right
      - name: Navigate to (3,2)
        run: cargo run -- do move right
      - name: Navigate to (4,2)
        run: cargo run -- do move right
      - name: Navigate to (5,2)
        run: cargo run -- do move right
      - name: Navigate to (5,1)
        run: cargo run -- do move up
      - name: Transition EastPath to Square
        run: cargo run -- do move up
      - name: Status at Square
        run: cargo run -- status

      # Navigate Square -> EastPath -> SouthRiver
      - name: Transition Square to EastPath
        run: cargo run -- do move down
      - name: Navigate to (4,1)
        run: cargo run -- do move left
      - name: Navigate to (3,1)
        run: cargo run -- do move left
      - name: Navigate to (2,1)
        run: cargo run -- do move left
      - name: Navigate to (2,2)
        run: cargo run -- do move down
      - name: Transition EastPath to SouthRiver
        run: cargo run -- do move down
      - name: Status at SouthRiver
        run: cargo run -- status

      # Fish at SouthRiver
      - name: Fish Down
        run: cargo run -- do fish down
      - name: Status after Fish
        run: cargo run -- status

      # Navigate SouthRiver -> EastPath -> Farm
      - name: Transition SouthRiver to EastPath
        run: cargo run -- do move up
      - name: Navigate to (1,2)
        run: cargo run -- do move left
      - name: Transition EastPath to Farm
        run: cargo run -- do move left
      - name: Status back at Farm
        run: cargo run -- status

      # Sleep and day transition
      - name: Sleep
        run: cargo run -- do sleep
      - name: Status Day 2
        run: cargo run -- status

  day-transition-cases:
    runs-on: ubuntu-latest
    env:
      TINYDEW_DB_PATH: /tmp/tinydew-cases.sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      # Setup: plant and water a crop on day 1
      - name: Initial Status (Day 1, 06:00)
        run: cargo run -- status
      - name: Clear tile above player
        run: cargo run -- do clear up
      - name: Status after Clear
        run: cargo run -- status
      - name: Plant seed
        run: cargo run -- do plant up
      - name: Status after Plant
        run: cargo run -- status
      - name: Water crop
        run: cargo run -- do water up
      - name: Status after Water
        run: cargo run -- status

      # Navigate Farm -> SouthRiver for fishing (each action = 5 min)
      - name: Navigate to (3,4)
        run: cargo run -- do move down
      - name: Navigate to (3,5)
        run: cargo run -- do move down
      - name: Navigate to (4,5)
        run: cargo run -- do move right
      - name: Navigate to (5,5)
        run: cargo run -- do move right
      - name: Navigate to (6,5)
        run: cargo run -- do move right
      - name: Transition Farm to EastPath
        run: cargo run -- do move right
      - name: Navigate to (2,2)
        run: cargo run -- do move right
      - name: Transition EastPath to SouthRiver
        run: cargo run -- do move down
      - name: Status at SouthRiver (06:55)
        run: cargo run -- status

      # Fish 17 times to reach 23:55 (each fish = 60 min)
      - name: Fish 1
        run: cargo run -- do fish
      - name: Status after Fish 1
        run: cargo run -- status
      - name: Fish 2
        run: cargo run -- do fish
      - name: Status after Fish 2
        run: cargo run -- status
      - name: Fish 3
        run: cargo run -- do fish
      - name: Status after Fish 3
        run: cargo run -- status
      - name: Fish 4
        run: cargo run -- do fish
      - name: Status after Fish 4
        run: cargo run -- status
      - name: Fish 5
        run: cargo run -- do fish
      - name: Status after Fish 5
        run: cargo run -- status
      - name: Fish 6
        run: cargo run -- do fish
      - name: Status after Fish 6
        run: cargo run -- status
      - name: Fish 7
        run: cargo run -- do fish
      - name: Status after Fish 7
        run: cargo run -- status
      - name: Fish 8
        run: cargo run -- do fish
      - name: Status after Fish 8
        run: cargo run -- status
      - name: Fish 9
        run: cargo run -- do fish
      - name: Status after Fish 9
        run: cargo run -- status
      - name: Fish 10
        run: cargo run -- do fish
      - name: Status after Fish 10
        run: cargo run -- status
      - name: Fish 11
        run: cargo run -- do fish
      - name: Status after Fish 11
        run: cargo run -- status
      - name: Fish 12
        run: cargo run -- do fish
      - name: Status after Fish 12
        run: cargo run -- status
      - name: Fish 13
        run: cargo run -- do fish
      - name: Status after Fish 13
        run: cargo run -- status
      - name: Fish 14
        run: cargo run -- do fish
      - name: Status after Fish 14
        run: cargo run -- status
      - name: Fish 15
        run: cargo run -- do fish
      - name: Status after Fish 15
        run: cargo run -- status
      - name: Fish 16
        run: cargo run -- do fish
      - name: Status after Fish 16
        run: cargo run -- status
      - name: Fish 17
        run: cargo run -- do fish
      - name: Status after Fish 17 (23:55)
        run: cargo run -- status

      # ===== CASE 1: Cross midnight — day increments, day-start does NOT fire =====
      - name: "CASE 1: Fish to cross midnight"
        run: cargo run -- do fish
      - name: "CASE 1: Status — day 2 00:55, crop still seedling, no weather/spawn/soil changes"
        run: cargo run -- status

      # ===== CASE 2: Reach 06:00 — day-start fires automatically =====
      - name: Fish toward 06:00 (1)
        run: cargo run -- do fish
      - name: Status after Fish toward 06:00 (1)
        run: cargo run -- status
      - name: Fish toward 06:00 (2)
        run: cargo run -- do fish
      - name: Status after Fish toward 06:00 (2)
        run: cargo run -- status
      - name: Fish toward 06:00 (3)
        run: cargo run -- do fish
      - name: Status after Fish toward 06:00 (3)
        run: cargo run -- status
      - name: Fish toward 06:00 (4)
        run: cargo run -- do fish
      - name: Status after Fish toward 06:00 (4)
        run: cargo run -- status
      - name: Fish toward 06:00 (5)
        run: cargo run -- do fish
      - name: Status after Fish toward 06:00 (5)
        run: cargo run -- status
      - name: "CASE 2: Fish crosses 06:00 — day-start fires"
        run: cargo run -- do fish
      - name: "CASE 2: Status — day 2 06:55, weather rolled, crop grew, spawns appeared"
        run: cargo run -- status

      # ===== CASE 3: Harvest, water, then sleep — advances to next day =====
      # Navigate SouthRiver -> EastPath -> Farm
      - name: Transition SouthRiver to EastPath
        run: cargo run -- do move up
      - name: Navigate to (1,2)
        run: cargo run -- do move left
      - name: Transition EastPath to Farm
        run: cargo run -- do move left
      - name: Navigate to (5,5)
        run: cargo run -- do move left
      - name: Navigate to (4,5)
        run: cargo run -- do move left
      - name: Navigate to (3,5)
        run: cargo run -- do move left
      - name: Navigate to (3,4)
        run: cargo run -- do move up
      - name: Navigate to (3,3)
        run: cargo run -- do move up
      - name: Status back at Farm
        run: cargo run -- status
      - name: Harvest mature crop above
        run: cargo run -- do harvest up
      - name: Status after Harvest
        run: cargo run -- status
      - name: Water crop above
        run: cargo run -- do water up
      - name: "CASE 3: Status after Water — crop harvested and re-watered"
        run: cargo run -- status
      - name: "CASE 3: Sleep"
        run: cargo run -- do sleep
      - name: "CASE 3: Status — day 3 06:00, next day-start fired, crop grew again"
        run: cargo run -- status

  regions-showcase:
    runs-on: ubuntu-latest
    env:
      TINYDEW_DB_PATH: /tmp/tinydew-regions.sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      # Day 1 — Start at Farm (3,3)
      - name: "Regions: Status at Farm"
        run: cargo run -- status

      # Navigate Farm -> EastPath (from (3,3) to PathEast (7,5))
      - name: Navigate to (3,4)
        run: cargo run -- do move down
      - name: Navigate to (3,5)
        run: cargo run -- do move down
      - name: Navigate to (4,5)
        run: cargo run -- do move right
      - name: Navigate to (5,5)
        run: cargo run -- do move right
      - name: Navigate to (6,5)
        run: cargo run -- do move right
      - name: Transition Farm to EastPath
        run: cargo run -- do move right
      - name: "Regions: Status at EastPath"
        run: cargo run -- status

      # Navigate EastPath -> Square (from (1,2) to PathSquare (5,0))
      - name: Navigate to (2,2)
        run: cargo run -- do move right
      - name: Navigate to (3,2)
        run: cargo run -- do move right
      - name: Navigate to (4,2)
        run: cargo run -- do move right
      - name: Navigate to (5,2)
        run: cargo run -- do move right
      - name: Navigate to (5,1)
        run: cargo run -- do move up
      - name: Transition EastPath to Square
        run: cargo run -- do move up
      - name: "Regions: Status at Square"
        run: cargo run -- status

      # Navigate Square -> EastPath -> SouthRiver
      - name: Transition Square to EastPath
        run: cargo run -- do move down
      - name: Navigate to (4,1)
        run: cargo run -- do move left
      - name: Navigate to (3,1)
        run: cargo run -- do move left
      - name: Navigate to (2,1)
        run: cargo run -- do move left
      - name: Navigate to (2,2)
        run: cargo run -- do move down
      - name: Transition EastPath to SouthRiver
        run: cargo run -- do move down
      - name: "Regions: Status at SouthRiver"
        run: cargo run -- status

  grow-showcase:
    runs-on: ubuntu-latest
    env:
      TINYDEW_DB_PATH: /tmp/tinydew-grow.sqlite
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build

      # Day 1 — Buy 5 seeds (start with 1, total 6)
      - name: Buy Seed 1
        run: cargo run -- do buy seed
      - name: Status after Buy Seed 1
        run: cargo run -- status
      - name: Buy Seed 2
        run: cargo run -- do buy seed
      - name: Status after Buy Seed 2
        run: cargo run -- status
      - name: Buy Seed 3
        run: cargo run -- do buy seed
      - name: Status after Buy Seed 3
        run: cargo run -- status
      - name: Buy Seed 4
        run: cargo run -- do buy seed
      - name: Status after Buy Seed 4
        run: cargo run -- status
      - name: Buy Seed 5
        run: cargo run -- do buy seed
      - name: Status after Buy Seed 5
        run: cargo run -- status

      # Clear and plant at (4,1) through (4,6)
      # Player at (3,3), navigate up to (3,1) then work downward
      - name: Navigate to (3,2)
        run: cargo run -- do move up
      - name: Navigate to (3,1)
        run: cargo run -- do move up
      - name: Clear (4,1)
        run: cargo run -- do clear right
      - name: Status after Clear (4,1)
        run: cargo run -- status
      - name: Plant (4,1)
        run: cargo run -- do plant right
      - name: Status after Plant (4,1)
        run: cargo run -- status
      - name: Navigate to (3,2)
        run: cargo run -- do move down
      - name: Clear (4,2)
        run: cargo run -- do clear right
      - name: Status after Clear (4,2)
        run: cargo run -- status
      - name: Plant (4,2)
        run: cargo run -- do plant right
      - name: Status after Plant (4,2)
        run: cargo run -- status
      - name: Navigate to (3,3)
        run: cargo run -- do move down
      - name: Clear (4,3)
        run: cargo run -- do clear right
      - name: Status after Clear (4,3)
        run: cargo run -- status
      - name: Plant (4,3)
        run: cargo run -- do plant right
      - name: Status after Plant (4,3)
        run: cargo run -- status
      - name: Navigate to (3,4)
        run: cargo run -- do move down
      - name: Clear (4,4)
        run: cargo run -- do clear right
      - name: Status after Clear (4,4)
        run: cargo run -- status
      - name: Plant (4,4)
        run: cargo run -- do plant right
      - name: Status after Plant (4,4)
        run: cargo run -- status
      - name: Navigate to (3,5)
        run: cargo run -- do move down
      - name: Clear (4,5)
        run: cargo run -- do clear right
      - name: Status after Clear (4,5)
        run: cargo run -- status
      - name: Plant (4,5)
        run: cargo run -- do plant right
      - name: Status after Plant (4,5)
        run: cargo run -- status
      - name: Navigate to (3,6)
        run: cargo run -- do move down
      - name: Clear (4,6)
        run: cargo run -- do clear right
      - name: Status after Clear (4,6)
        run: cargo run -- status
      - name: Plant (4,6)
        run: cargo run -- do plant right
      - name: "Grow: Status after planting 6 crops"
        run: cargo run -- status

      # Water only (4,1), (4,3), (4,5) — navigate back up
      - name: Navigate to (3,5)
        run: cargo run -- do move up
      - name: Navigate to (3,4)
        run: cargo run -- do move up
      - name: Navigate to (3,3)
        run: cargo run -- do move up
      - name: Navigate to (3,2)
        run: cargo run -- do move up
      - name: Navigate to (3,1)
        run: cargo run -- do move up
      - name: Water (4,1)
        run: cargo run -- do water right
      - name: Status after Water (4,1)
        run: cargo run -- status
      - name: Navigate to (3,2)
        run: cargo run -- do move down
      - name: Navigate to (3,3)
        run: cargo run -- do move down
      - name: Water (4,3)
        run: cargo run -- do water right
      - name: Status after Water (4,3)
        run: cargo run -- status
      - name: Navigate to (3,4)
        run: cargo run -- do move down
      - name: Navigate to (3,5)
        run: cargo run -- do move down
      - name: Water (4,5)
        run: cargo run -- do water right
      - name: Status after Water (4,5)
        run: cargo run -- status

      # Sleep to next day
      - name: "Grow: Sleep to Day 2"
        run: cargo run -- do sleep
      - name: "Grow: Status Day 2 — watered crops (4,1)(4,3)(4,5) matured, unwatered (4,2)(4,4)(4,6) still seedling"
        run: cargo run -- status
